          <div class="search">
            <input
              class="input"
              type="text"
              id="searchQuran"
              placeholder="Search surah…"
            />
          </div>
          <label class="switch" title="Toggle dark mode">
            <input type="checkbox" id="darkModeToggle" />
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </header>

    <main id="main" class="quran-page">
      <aside class="surah-list">
        <div class="surah-list-header">
          <h2>Surahs</h2>
          <div class="filter-tabs">
            <button class="active" data-filter="all">All</button>
            <button data-filter="meccan">Meccan</button>
            <button data-filter="medinan">Medinan</button>
          </div>
        </div>
        <div id="surahList" class="surahs"></div>
      </aside>

      <section class="quran-content">
        <div class="content-header">
          <div class="surah-info">
            <h1 id="surahTitle">Select a Surah</h1>
            <p id="surahMeta" class="muted"></p>
          </div>
          <div class="content-controls">
            <label>
              <input type="checkbox" id="showTranslation" checked />
              Show Translation
            </label>
            <label>
              <input type="checkbox" id="showTafseer" />
              Show Tafseer
            </label>
            <select id="translationLang">
              <option value="en.asad">English - Muhammad Asad</option>
              <option value="en.sahih">English - Saheeh International</option>
              <option value="en.pickthall">English - Pickthall</option>
              <option value="en.yusufali">English - Yusuf Ali</option>
              <option value="ur.jalandhry">Urdu - Jalandhry</option>
              <option value="id.indonesian">Indonesian</option>
              <option value="fr.hamidullah">French - Hamidullah</option>
            </select>
            <select id="fontSize">
              <option value="small">Small</option>
              <option value="medium" selected>Medium</option>
              <option value="large">Large</option>
              <option value="xlarge">Extra Large</option>
            </select>
          </div>
        </div>

        <div id="loading" class="loading" style="display: none">
          <div class="spinner"></div>
          <p>Loading Surah...</p>
        </div>
        <div id="ayahContainer" class="ayah-container"></div>

        <div class="pagination">
          <button id="prevSurah" class="btn secondary" disabled>
            ← Previous Surah
          </button>
          <button id="nextSurah" class="btn secondary" disabled>
            Next Surah →
          </button>
        </div>
      </section>
    </main>
