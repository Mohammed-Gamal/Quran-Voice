    <main id="main" class="card-container">
      <div class="card">
        <h1>Prayer Times</h1>
        <p class="sub">
          Automatically calculates today's times using your current location.
        </p>

        <div class="row">
          <div>
            <label>Location</label>
            <div id="loc" class="muted">Waiting for permission…</div>
          </div>
          <div>
            <label>&nbsp;</label>
            <div style="display: flex; gap: 8px; align-items: center">
              <button class="btn" id="useGPS">Use GPS</button>
              <button class="btn secondary" id="manualToggle">
                Enter manually
              </button>
            </div>
          </div>
        </div>

        <div
          id="manualPanel"
          class="row"
          style="margin-top: 12px; display: none"
        >
          <div>
            <label>Latitude</label>
            <input
              class="input"
              type="number"
              id="lat"
              step="0.0001"
              placeholder="e.g. 24.7136"
            />
          </div>
          <div>
            <label>Longitude</label>
            <input
              class="input"
              type="number"
              id="lon"
              step="0.0001"
              placeholder="e.g. 46.6753"
            />
          </div>
        </div>

        <div class="row" style="margin-top: 12px">
          <div>
            <label>Calculation method</label>
            <select id="method">
              <option value="MWL">Muslim World League</option>
              <option value="UmmAlQura">Umm al-Qura</option>
              <option value="Egyptian">Egyptian General Authority</option>
              <option value="Karachi">Karachi (Hanafi)</option>
              <option value="NorthAmerica">ISNA (North America)</option>
              <option value="Kuwait">Kuwait</option>
              <option value="Qatar">Qatar</option>
              <option value="Dubai">Dubai</option>
              <option value="Turkey">Turkey</option>
            </select>
          </div>
          <div>
            <label>Madhab</label>
            <select id="madhab">
              <option value="Shafi">Shafi’i / Maliki / Hanbali</option>
              <option value="Hanafi">Hanafi</option>
            </select>
          </div>
        </div>

        <div class="row" style="margin-top: 12px">
          <div>
            <label>High‑latitude rule</label>
            <select id="highLat">
              <option value="MiddleOfTheNight">Middle of the Night</option>
              <option value="SeventhOfTheNight">Seventh of the Night</option>
              <option value="TwilightAngle">Twilight Angle</option>
            </select>
          </div>
          <div>
            <label>Timezone</label>
            <div id="tz" class="muted"></div>
          </div>
        </div>

        <div
          style="display: flex; align-items: center; gap: 8px; margin-top: 16px"
        >
          <div id="nextPrayer" class="muted"></div>
          <button class="btn secondary" id="recalc">Recalculate</button>
        </div>

        <div class="grid" id="times" style="margin-top: 12px"></div>
        <div class="footer-note" id="notes"></div>
      </div>
    </main>

    <footer>
