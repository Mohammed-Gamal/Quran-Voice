			<div class="nav-tools">
				<div class="search" aria-hidden="true">
					<input class="input" type="text" placeholder="Search…" disabled>
				</div>
				<label class="switch" title="Toggle dark mode">
					<input type="checkbox" id="darkModeToggle" />
					<span class="slider"></span>
				</label>
			</div>
		</div>
	</header>
	<main id="main" class="container">
		<section class="hero" aria-label="Brand">
			<img class="main-logo" src="assets/logo.svg" alt="Quran Voice logo">
			<p class="tagline">Stream beautiful Quran radios and read daily adhkar.</p>
		</section>
		<section class="player" aria-label="Quran player">
			<div class="tabs" role="tablist" aria-label="Content tabs">
				<button class="tab-btn active" data-tab="radios" role="tab" aria-selected="true">Radios</button>
				<button class="tab-btn" data-tab="recitations" role="tab" aria-selected="false">Recitations</button>
			</div>
			<div class="player-container">
				<div class="tab-content active" data-content="radios">
					<div class="radios">
						<label for="reciterSelect" class="sr-only">Choose radio</label>
						<select id="reciterSelect" title="Select Radio"></select>
						<div data-radios-status class="muted" style="margin-top:.5rem"></div>
					</div>
					<img class="reciter-picture" src="https://i1.sndcdn.com/artworks-000663801097-wb0y31-t200x200.jpg" alt="Current radio cover">
					<audio id="quraanAudio" autoplay hidden></audio>
					<div class="audio-player" role="group" aria-label="Audio player">
						<button class="btn icon" data-play aria-label="Play" aria-pressed="false" title="Play/Pause">
							▶︎
						</button>
						<div class="time-display">
							<span data-current>00:00</span>
							<span class="muted">/</span>
							<span data-duration>--:--</span>
						</div>
						<input class="seek" type="range" min="0" value="0" step="1" data-seek aria-label="Seek" />
						<button class="btn icon" data-mute aria-label="Mute" aria-pressed="false" title="Mute/Unmute">🔈</button>
						<input class="volume" type="range" min="0" max="1" step="0.01" value="1" data-volume aria-label="Volume" />
						<select class="rate" data-rate aria-label="Playback speed" title="Speed">
							<option value="0.75">0.75×</option>
							<option value="1" selected>1×</option>
							<option value="1.25">1.25×</option>
							<option value="1.5">1.5×</option>
						</select>
					</div>
					<p class="azkar" aria-live="polite"></p>
				</div>
				<div class="tab-content" data-content="recitations">
					<!-- Recitations content will be rendered here by JavaScript -->
				</div>
			</div>
		</section>
	</main>
	<footer>
		<p>&copy; <span class="year">2025</span> Quran Voice</p>
